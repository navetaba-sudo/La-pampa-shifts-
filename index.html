<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>La Pampa Shifts</title>
<link rel="apple-touch-icon" href="logo.png" />
<link rel="icon" type="image/png" href="logo.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="La Pampa Shifts" />
<meta name="theme-color" content="#2A1410" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Anton&display=swap" rel="stylesheet">
<style>
:root{
  /* La Pampa brand palette */
  --mustard:#F2A71B;
  --mustard-deep:#E0930C;
  --burgundy:#5E1A1A;
  --burgundy-soft:#7A2424;
  --cream:#F7EBD3;
  --cream-dim:#E8D9BC;
  /* surfaces — warm dark "diner at night" */
  --bg:#241310;
  --bg-2:#2E1A15;
  --panel:#34201A;
  --panel-2:#3E2820;
  --line:#4A2F26;
  --line-soft:#3A241D;
  --ink:#F7EBD3;
  --ink-dim:#C7A98A;
  --ink-faint:#8C6E5A;
  --morning:#F2A71B;
  --evening:#C2562B;
  --ok:#6FAE5A;
  --danger:#D2553F;
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;}
body{
  font-family:'Heebo',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  direction:rtl;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
@media(prefers-reduced-motion:no-preference){
  .fade-in{animation:fadeIn .4s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
}

/* ── subtle diner texture bg ── */
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(242,167,27,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(94,26,26,.30), transparent 55%);
}

/* ════ HEADER ════ */
#header{
  position:sticky;top:0;z-index:60;
  background:linear-gradient(180deg, rgba(46,26,21,.96), rgba(36,19,16,.92));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
}
#header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:11px;min-width:0;}
#app-logo{height:46px;width:46px;border-radius:12px;object-fit:cover;box-shadow:0 2px 10px rgba(0,0,0,.4);border:1.5px solid rgba(242,167,27,.4);flex-shrink:0;}
.brand-text{min-width:0;}
.brand-name{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:.5px;color:var(--cream);line-height:1;}
.brand-name b{color:var(--mustard);}
.brand-sub{font-size:10px;color:var(--ink-faint);margin-top:3px;letter-spacing:2px;text-transform:uppercase;}

#gear-btn{
  background:var(--panel);border:1px solid var(--line);color:var(--cream);
  border-radius:12px;padding:9px 13px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;
  display:flex;align-items:center;gap:6px;transition:.15s;
}
#gear-btn:active{transform:scale(.96);background:var(--panel-2);}

/* ════ WEEK STRIP ════ */
#weekstrip{
  background:var(--bg-2);border-bottom:1px solid var(--line-soft);
  padding:10px 18px;
}
#weekstrip-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:14px;}
.week-arrow{
  background:var(--panel);border:1px solid var(--line);color:var(--cream);
  width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:20px;font-family:inherit;
  display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;
}
.week-arrow:active{transform:scale(.92);background:var(--mustard);color:var(--burgundy);}
#week-label-wrap{text-align:center;min-width:150px;}
#week-label-main{font-weight:800;font-size:15px;color:var(--cream);}
#week-label-sub{font-size:11px;color:var(--ink-faint);margin-top:2px;letter-spacing:.5px;}

/* ════ TABS ════ */
#tabs-bar{padding:14px 18px 0;}
#tabs-inner{
  max-width:1000px;margin:0 auto;
  display:flex;gap:8px;align-items:center;
}
.seg{
  display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:4px;flex:1;
}
.tab-btn{
  flex:1;padding:10px 8px;border-radius:10px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;background:transparent;color:var(--ink-dim);
  transition:.18s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;
  white-space:nowrap;
}
.tab-btn.active{background:var(--mustard);color:var(--burgundy);box-shadow:0 2px 8px rgba(242,167,27,.3);}
.tab-ico{font-size:14px;}

#finalize-btn{
  padding:11px 18px;border-radius:13px;border:none;cursor:pointer;
  font-size:13px;font-weight:800;background:var(--ok);color:#10220C;
  font-family:inherit;white-space:nowrap;transition:.15s;box-shadow:0 3px 12px rgba(111,174,90,.3);
}
#finalize-btn:active{transform:scale(.96);}
.unpub{
  font-size:12px;color:var(--ok);display:none;align-items:center;gap:5px;font-weight:700;
  white-space:nowrap;background:rgba(111,174,90,.14);border:1px solid rgba(111,174,90,.4);
  padding:9px 14px;border-radius:13px;cursor:pointer;font-family:inherit;transition:.15s;
}
.unpub:active{transform:scale(.96);}

/* ════ MAIN ════ */
#main{max-width:1000px;margin:0 auto;padding:18px;}
.view{display:none;}
.view.active{display:block;}
.view-title{font-family:'Anton',sans-serif;font-size:24px;color:var(--cream);letter-spacing:.5px;}
.view-title .accent{color:var(--mustard);}
.view-sub{font-size:13px;color:var(--ink-dim);margin:5px 0 18px;line-height:1.5;}

/* ════ CARDS ════ */
.card{background:var(--panel);border-radius:var(--r);border:1px solid var(--line);padding:16px;}

/* ════ SCHEDULE TABLE ════ */
.tbl-scroll{overflow-x:auto;margin:0 -4px;padding:0 4px;}
.schedule-table{width:100%;border-collapse:separate;border-spacing:6px;min-width:560px;}
.schedule-table thead th{
  color:var(--ink-dim);font-size:11px;font-weight:700;padding:4px 2px 8px;text-align:center;
}
.schedule-table th.shift-col{text-align:right;width:96px;}
.th-day-name{display:block;font-size:13px;color:var(--cream);font-weight:800;}
.th-day-name.today{color:var(--mustard);}
.th-day-date{display:block;color:var(--ink-faint);font-weight:500;font-size:10px;margin-top:1px;}

.shift-rowhead{
  text-align:right;vertical-align:middle;
}
.shift-chip{display:flex;align-items:center;gap:8px;}
.shift-bar{width:4px;height:34px;border-radius:3px;flex-shrink:0;}
.shift-name{font-weight:800;font-size:14px;color:var(--cream);}
.shift-time{font-size:10px;color:var(--ink-faint);margin-top:2px;letter-spacing:.3px;}

.cell{
  background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;
  padding:6px;min-height:74px;vertical-align:top;
  display:flex;flex-direction:column;gap:4px;
}
.cell-empty{margin:auto;color:var(--ink-faint);font-size:10px;text-align:center;opacity:.55;}
.pill{
  padding:5px 8px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:.15s;user-select:none;
  border:1.5px solid transparent;white-space:nowrap;overflow:hidden;
}
.pill .pill-ic{font-size:11px;opacity:.9;width:12px;text-align:center;flex-shrink:0;}
.pill .pill-nm{overflow:hidden;text-overflow:ellipsis;}
.pill.available{background:var(--panel-2);border-color:var(--line);color:var(--ink-dim);}
.pill.available:active{transform:scale(.96);}
.pill.assigned{color:#fff;}
.pill.assigned:active{transform:scale(.96);}

/* summary */
.summary-title{font-size:11px;color:var(--ink-faint);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.summary-bar{display:flex;flex-wrap:wrap;gap:8px;}
.summary-pill{display:flex;align-items:center;gap:7px;border-radius:10px;padding:7px 12px;border:1px solid;}
.summary-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.summary-nm{font-size:12px;font-weight:700;}
.summary-ct{font-size:11px;color:var(--ink-faint);font-weight:600;}

/* ════ AVAILABILITY ════ */
.emp-chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
.emp-chip{
  display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:13px;cursor:pointer;
  background:var(--panel);border:1.5px solid var(--line);transition:.15s;user-select:none;
}
.emp-chip:active{transform:scale(.97);}
.chip-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.chip-nm{font-size:13px;font-weight:700;color:var(--cream);}

.avail-table{width:100%;border-collapse:separate;border-spacing:6px;min-width:560px;}
.avail-table thead th{color:var(--ink-dim);font-size:11px;padding:4px 2px 6px;text-align:center;}
.avail-table th.shift-col{text-align:right;width:90px;}
.avail-cell{
  width:42px;height:42px;border-radius:12px;margin:0 auto;cursor:pointer;
  border:1.5px solid var(--line);background:var(--bg-2);
  display:flex;align-items:center;justify-content:center;font-size:18px;transition:.15s;user-select:none;
}
.avail-cell:active{transform:scale(.9);}
.avail-hint{font-size:12px;color:var(--ink-faint);margin-top:14px;text-align:center;line-height:1.6;}

/* empty state */
.empty-state{text-align:center;padding:42px 20px;}
.empty-ic{font-size:40px;margin-bottom:14px;opacity:.6;}
.empty-tt{font-weight:800;color:var(--cream);margin-bottom:6px;font-size:16px;}
.empty-sb{font-size:13px;color:var(--ink-dim);line-height:1.5;}

/* ════ FINAL ════ */
#final-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
#final-title{font-family:'Anton',sans-serif;font-size:22px;color:var(--cream);letter-spacing:.5px;}
#final-title .accent{color:var(--mustard);}
#final-sub{font-size:12px;color:var(--ink-faint);margin-top:3px;}
#download-btn{
  background:var(--ok);border-radius:13px;padding:11px 18px;color:#10220C;font-weight:800;font-size:13px;
  text-decoration:none;display:none;align-items:center;gap:6px;transition:.15s;box-shadow:0 3px 12px rgba(111,174,90,.3);
}
#download-btn:active{transform:scale(.96);}

#img-wrap{padding:14px;margin-bottom:18px;}
#img-head{font-size:12px;color:var(--ink-dim);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;font-weight:600;}
#schedule-img{width:100%;border-radius:12px;border:1px solid var(--line);display:block;}
#img-hint{font-size:11px;color:var(--ink-faint);margin-top:11px;text-align:center;line-height:1.5;}
#regen-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);border-radius:9px;padding:6px 12px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;}

.day-cards{display:flex;flex-direction:column;gap:12px;}
.day-head{font-weight:800;color:var(--cream);font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:9px;}
.day-label{background:var(--burgundy);color:var(--cream);border-radius:9px;padding:4px 11px;font-size:13px;font-weight:800;}
.day-label.today{background:var(--mustard);color:var(--burgundy);}
.day-date{color:var(--ink-faint);font-size:12px;}
.day-noshift{color:var(--ink-faint);font-size:11px;opacity:.7;}
.shift-cards{display:flex;gap:11px;flex-wrap:wrap;}
.shift-card{flex:1;min-width:145px;background:var(--bg-2);border-radius:13px;padding:12px 14px;border:1.5px solid var(--line-soft);}
.sc-head{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.sc-bar{width:4px;height:18px;border-radius:3px;}
.sc-name{font-size:13px;font-weight:800;}
.sc-time{font-size:10px;color:var(--ink-faint);margin-right:auto;}
.sc-empty{font-size:12px;color:var(--ink-faint);opacity:.5;}
.assigned-list{display:flex;flex-direction:column;gap:8px;}
.assigned-row{display:flex;align-items:center;gap:8px;}
.person-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.person-nm{font-size:13px;font-weight:700;color:var(--cream);}
.person-rl{font-size:10px;color:var(--ink-faint);}
#final-banner{margin-top:16px;background:linear-gradient(135deg,rgba(111,174,90,.14),rgba(111,174,90,.06));border:1px solid rgba(111,174,90,.3);border-radius:var(--r);padding:16px;text-align:center;}
.fb-tt{color:var(--ok);font-weight:800;font-size:15px;}
.fb-sb{color:var(--ink-dim);font-size:12px;margin-top:5px;}

/* ════ BUTTONS ════ */
.btn-primary{background:var(--mustard);border:none;color:var(--burgundy);border-radius:13px;padding:12px 18px;cursor:pointer;font-weight:800;font-size:14px;font-family:inherit;transition:.15s;}
.btn-primary:active{transform:scale(.97);background:var(--mustard-deep);}
.btn-ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);border-radius:13px;padding:12px 18px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;transition:.15s;}
.btn-ghost:active{transform:scale(.97);}
.btn-danger{background:rgba(210,85,63,.16);border:1px solid rgba(210,85,63,.4);color:var(--danger);border-radius:13px;padding:12px 18px;cursor:pointer;font-size:14px;font-weight:800;font-family:inherit;transition:.15s;}
.btn-danger:active{transform:scale(.97);}
.btn-danger-sm{background:rgba(210,85,63,.14);border:1px solid rgba(210,85,63,.3);color:var(--danger);border-radius:10px;padding:7px 13px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.15s;}
.btn-danger-sm:active{transform:scale(.95);}

/* ════ EMP MANAGE ════ */
#emp-manage-list{display:flex;flex-direction:column;gap:11px;}
.em-row{background:var(--bg-2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line-soft);gap:10px;}
.em-left{display:flex;align-items:center;gap:13px;min-width:0;}
.em-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;}
.em-nm{font-weight:800;font-size:16px;color:var(--cream);}
.em-rl{font-size:12px;color:var(--ink-faint);margin-top:2px;}

/* ════ MODALS ════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,8,6,.7);z-index:300;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
.modal-box{background:var(--panel);border-radius:22px;padding:26px;width:100%;max-width:420px;border:1px solid var(--line);max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-title{font-family:'Anton',sans-serif;font-size:20px;color:var(--cream);letter-spacing:.5px;}
.modal-x{background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);font-size:18px;cursor:pointer;line-height:1;width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.form-label{font-size:12px;color:var(--ink-dim);display:block;margin-bottom:7px;font-weight:600;}
.form-input,.form-select{width:100%;background:var(--bg-2);border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ink);font-size:15px;direction:rtl;font-family:inherit;transition:.15s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--mustard);}
.form-group{margin-bottom:16px;}
.btn-row{display:flex;gap:10px;margin-top:6px;}
.btn-row>*{flex:1;}

#cd-av{width:62px;height:62px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;}
#cd-nm{font-size:19px;font-weight:800;color:var(--cream);margin-bottom:5px;text-align:center;}
#cd-sub{font-size:13px;color:var(--ink-dim);margin-bottom:18px;text-align:center;}
#cd-warn{background:rgba(210,85,63,.1);border:1px solid rgba(210,85,63,.25);border-radius:12px;padding:12px 14px;font-size:12px;color:#E89A8A;margin-bottom:20px;text-align:center;line-height:1.5;}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 28px);transform:translateX(-50%) translateY(100px);background:var(--burgundy);color:var(--cream);padding:13px 22px;border-radius:14px;font-weight:700;font-size:14px;z-index:400;box-shadow:var(--shadow);opacity:0;transition:.3s cubic-bezier(.2,.8,.2,1);border:1px solid var(--burgundy-soft);}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* cloud save indicator */
#save-dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;transition:.3s;}
#save-dot.saved{background:var(--ok);box-shadow:0 0 8px rgba(111,174,90,.5);}
#save-dot.error{background:var(--danger);}

/* ════════════ DESKTOP / WIDE SCREENS ════════════ */
@media(min-width:820px){
  :root{--r:18px;}
  #header{padding:18px 32px;}
  #app-logo{height:54px;width:54px;}
  .brand-name{font-size:23px;}
  #header-inner,#weekstrip-inner,#tabs-inner,#main{max-width:1180px;}
  #weekstrip{padding:14px 32px;}
  #week-label-wrap{min-width:200px;}
  #week-label-main{font-size:17px;}
  #tabs-bar{padding:18px 32px 0;}
  .tab-btn{font-size:14px;padding:12px 10px;}
  #main{padding:28px 32px;}
  .view-title{font-size:30px;}
  .view-sub{font-size:14px;margin-bottom:24px;}

  /* schedule fills the width — no more cramped columns */
  .schedule-table,.avail-table{min-width:0;border-spacing:9px;}
  .schedule-table th.shift-col,.avail-table th.shift-col{width:130px;}
  .cell{min-height:92px;padding:9px;}
  .pill{font-size:12px;padding:7px 11px;}
  .th-day-name{font-size:15px;}
  .avail-cell{width:50px;height:50px;font-size:20px;}

  /* summary spreads out */
  .summary-pill{padding:9px 15px;}
  .summary-nm{font-size:13px;}

  /* final view: day cards in a 2-column grid on wide screens */
  .day-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  #img-wrap{grid-column:1/-1;}
  #final-banner{grid-column:1/-1;}
  .shift-card{min-width:0;}

  /* nicer hover feedback for mouse users */
  .pill:hover{filter:brightness(1.12);}
  .week-arrow:hover,#gear-btn:hover{border-color:var(--mustard);}
  .emp-chip:hover{border-color:var(--mustard);}
  .em-row:hover{background:var(--panel-2);}
  .tab-btn:not(.active):hover{color:var(--cream);}
}

@media(min-width:1100px){
  /* on big screens, give the final-view image a comfortable max width */
  #schedule-img{max-width:760px;margin:0 auto;}
}
</style>
</head>
<body>
<canvas id="schedule-canvas" style="display:none"></canvas>

<!-- HEADER -->
<header id="header">
  <div id="header-inner">
    <div class="brand">
      <img src="logo.png" alt="La Pampa" id="app-logo" />
      <div class="brand-text">
        <div class="brand-name">LA <b>PAMPA</b></div>
        <div class="brand-sub" id="emp-count">SHIFTS</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="save-dot" title="טוען..."></span>
      <button id="gear-btn" title="ניהול עובדים"><span>👥</span><span>עובדים</span></button>
    </div>
  </div>
</header>

<!-- WEEK STRIP -->
<div id="weekstrip">
  <div id="weekstrip-inner">
    <button class="week-arrow" id="prev-week-btn">›</button>
    <div id="week-label-wrap">
      <div id="week-label-main"></div>
      <div id="week-label-sub"></div>
    </div>
    <button class="week-arrow" id="next-week-btn">‹</button>
  </div>
</div>

<!-- TABS -->
<div id="tabs-bar">
  <div id="tabs-inner">
    <div class="seg">
      <button class="tab-btn active" data-tab="assign"><span class="tab-ico">🗓</span>שיבוץ</button>
      <button class="tab-btn" data-tab="availability"><span class="tab-ico">✅</span>זמינות</button>

    </div>
    <button id="finalize-btn">פרסם ✓</button>
    <button id="unpublish-btn" class="unpub" style="display:none">✓ פורסם · לעריכה</button>
  </div>
</div>

<!-- MAIN -->
<main id="main">

  <div id="view-assign" class="view active">
    <div class="view-title">שיבוץ <span class="accent">משמרות</span></div>

    <div class="tbl-scroll"><table class="schedule-table" id="assign-table"></table></div>
    <div class="card" style="margin-top:18px">
      <div class="summary-title">סיכום השבוע</div>
      <div class="summary-bar" id="summary-bar"></div>

  </div>

  <div id="view-availability" class="view">
    <div class="view-title">זמינות <span class="accent">עובדים</span></div>

</main>

      <button class="btn-ghost" id="cd-no">ביטול</button>

<div id="toast"></div>

<script type="module">
// ════════════ FIREBASE ════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASnhdtgX1kzj7cSdT7JYA1T2OvOTis_Lo",
  authDomain: "la-pampa-shifts.firebaseapp.com",
  projectId: "la-pampa-shifts",
  storageBucket: "la-pampa-shifts.firebasestorage.app",
  messagingSenderId: "833025307455",
  appId: "1:833025307455:web:5384322247d7e8d940998a"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, "appdata", "main");

let saveTimer = null;
let cloudReady = false;

function cloudSave(){
  if(!cloudReady) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await setDoc(DOC_REF, { employees, availability, schedule, finalized });
      const d=$('save-dot'); if(d){ d.className='saved'; d.title='נשמר בענן'; }
    }catch(err){
      console.error('save failed',err);
      const d=$('save-dot'); if(d){ d.className='error'; d.title='שגיאת שמירה'; }
    }
  }, 800);
}

async function cloudLoad(){
  try{
    const snap = await getDoc(DOC_REF);
    if(snap.exists()){
      const d = snap.data();
      if(d.employees)    employees    = d.employees.map(e=>({...e, id:Number(e.id)}));
      if(d.availability) availability = d.availability;
      if(d.schedule){
        // normalize empIds inside schedule arrays to numbers
        const s={};
        Object.keys(d.schedule).forEach(wk=>{
          s[wk]={};
          Object.keys(d.schedule[wk]).forEach(cell=>{
            s[wk][cell]=(d.schedule[wk][cell]||[]).map(Number);
          });
        });
        schedule=s;
      }
      if(d.finalized){ const f={}; Object.keys(d.finalized).forEach(k=>{ if(d.finalized[k]) f[k]=true; }); finalized=f; }
    }
  }catch(err){ console.error('load failed',err); }
  cloudReady = true;
  renderAll();
  const dot=$('save-dot'); if(dot){ dot.className='saved'; dot.title='מסונכרן'; }
}

const DAYS_HE=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const SHIFTS=[
  {id:"morning",label:"בוקר",time:"11:00–16:00",color:"#F2A71B"},
  {id:"evening",label:"ערב",time:"16:00–22:00",color:"#C2562B"},
];
const ROLES=["מלצר/ית","ברמן/ית","קופאי/ת","מנהל/ת","שף/טבח"];
const EMP_COLORS=["#E0552F","#3F7BB8","#9B59B6","#16A085","#E08A1E","#C0397B","#5D7C3F","#B0413E","#2C8C99","#8E44AD"];

let employees=[
  {id:1,name:"נועה כהן",role:"מלצר/ית",color:"#E0552F"},
  {id:2,name:"יוסי לוי",role:"ברמן/ית",color:"#3F7BB8"},
  {id:3,name:"מיכל גולן",role:"קופאי/ת",color:"#9B59B6"},
  {id:4,name:"אמיר ברק",role:"שף/טבח",color:"#16A085"},
];
let availability={1:{0:{"1-morning":true,"3-evening":true,"4-evening":true}},2:{0:{"0-morning":true,"2-morning":true,"4-morning":true}}};
let schedule={},finalized={},weekOffset=0,currentView="assign",selectedAvailEmp=null,imgDataUrl=null,pendingDeleteId=null;

const $=id=>document.getElementById(id);
function getWeekDates(off){const n=new Date(),s=new Date(n);s.setDate(n.getDate()-n.getDay()+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});}
function fmt(d){return `${d.getDate()}/${d.getMonth()+1}`;}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}
function weekLabel(o){if(o===0)return"השבוע הנוכחי";if(o===1)return"השבוע הבא";if(o===-1)return"השבוע שעבר";const w=getWeekDates(o);return `${fmt(w[0])} – ${fmt(w[6])}`;}
function cellKey(d,s){return `${d}-${s}`;}
function getWeekSched(){return schedule[weekOffset]||{};}
function getAssigned(d,s){return getWeekSched()[cellKey(d,s)]||[];}
function isAvailable(e,d,s){return !!((availability[e]||{})[weekOffset]||{})[cellKey(d,s)];}
function isAssigned(e,d,s){return getAssigned(d,s).includes(e);}
function isFinalized(){return !!(finalized[weekOffset]||finalized[String(weekOffset)]);}
function getEmp(id){return employees.find(e=>e.id===id);}
function totalAssigned(e){return Object.values(getWeekSched()).filter(a=>a.includes(e)).length;}

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

function toggleAssign(e,d,s){if(isFinalized())return;e=Number(e);if(!schedule[weekOffset])schedule[weekOffset]={};const k=cellKey(d,s),c=(schedule[weekOffset][k]||[]).map(Number);schedule[weekOffset][k]=c.includes(e)?c.filter(x=>x!==e):[...c,e];renderAll();cloudSave();}
function toggleAvail(e,d,s){if(!availability[e])availability[e]={};if(!availability[e][weekOffset])availability[e][weekOffset]={};const k=cellKey(d,s);if(availability[e][weekOffset][k])delete availability[e][weekOffset][k];else availability[e][weekOffset][k]=true;renderAll();cloudSave();}

/* ── CANVAS IMAGE (La Pampa themed) ── */
function drawImage(){
  const c=$('schedule-canvas'),dpr=window.devicePixelRatio||1;
  const W=1400, H=240+SHIFTS.length*200+70;   // big, room to breathe
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  const x=c.getContext('2d');x.scale(dpr,dpr);
  const wd=getWeekDates(weekOffset);

  // ---- background ----
  x.fillStyle='#241310';x.fillRect(0,0,W,H);

  // ---- header band ----
  const HB=150;
  const g=x.createLinearGradient(0,0,0,HB);g.addColorStop(0,'#46241a');g.addColorStop(1,'#2c1813');
  x.fillStyle=g;x.fillRect(0,0,W,HB);
  x.fillStyle='#F2A71B';x.fillRect(0,0,W,7);            // mustard top accent

  x.direction='rtl';x.textAlign='right';
  x.fillStyle='#F7EBD3';x.font='800 50px Anton,"Heebo",sans-serif';
  x.fillText('LA PAMPA',W-40,66);
  x.fillStyle='#F2A71B';x.font='800 26px Anton,"Heebo",sans-serif';
  x.fillText('לוח משמרות',W-40,104);
  x.fillStyle='#C7A98A';x.font='600 22px "Heebo",sans-serif';
  x.fillText(`${weekLabel(weekOffset)}  ·  ${fmt(wd[0])} – ${fmt(wd[6])}`,W-40,134);

  // ---- layout grid ----
  const LEFT=190;                                  // shift label column width
  const COL=(W-LEFT-30)/7;
  const headY=HB+10;
  const headH=64;
  const ROW=200;
  const sY=headY+headH;

  // ---- day headers ----
  wd.forEach((d,i)=>{
    const cx=W-30-(i*COL)-COL/2;                    // RTL: ראשון on the right
    const td=isToday(d);
    if(td){ x.fillStyle='rgba(242,167,27,.16)';rr(x,cx-COL/2+4,headY+4,COL-8,headH-6,12);x.fill(); }
    x.textAlign='center';
    x.fillStyle=td?'#F2A71B':'#F7EBD3';x.font='800 28px "Heebo",sans-serif';
    x.fillText(DAYS_HE[i],cx,headY+34);
    x.fillStyle=td?'#F2A71B':'#8C6E5A';x.font='600 18px "Heebo",sans-serif';
    x.fillText(fmt(d),cx,headY+57);
  });

  // ---- shift rows ----
  SHIFTS.forEach((sh,si)=>{
    const y=sY+si*ROW;
    // shift label block (right side)
    x.fillStyle=sh.color;rr(x,W-LEFT+6,y+12,7,ROW-24,4);x.fill();
    x.textAlign='right';
    x.fillStyle='#F7EBD3';x.font='800 30px "Heebo",sans-serif';
    x.fillText(sh.label,W-26,y+ROW/2-6);
    x.fillStyle=sh.color;x.font='700 20px "Heebo",sans-serif';
    x.fillText(sh.time,W-26,y+ROW/2+24);

    wd.forEach((_,di)=>{
      const cx=W-30-(di*COL)-COL;   // left edge of this day's cell
      const pad=7;
      // cell bg
      x.fillStyle='#2E1A15';rr(x,cx+pad,y+pad,COL-pad*2,ROW-pad*2,16);x.fill();

      const ids=getAssigned(di,sh.id);
      if(!ids.length){
        x.fillStyle='#5a4030';x.font='600 26px "Heebo",sans-serif';x.textAlign='center';
        x.fillText('—',cx+COL/2,y+ROW/2+8);
      } else {
        const innerTop=y+pad+10, innerH=ROW-pad*2-16;
        const ih=Math.min(58, innerH/ids.length);
        const blockH=ih*ids.length;
        const startY=innerTop+(innerH-blockH)/2;    // vertically center the names
        ids.forEach((id,ii)=>{
          const e=getEmp(id);if(!e)return;
          const ey=startY+ii*ih, ex=cx+pad+5, ew=COL-pad*2-10, bh=ih-7;
          x.fillStyle=e.color;rr(x,ex,ey,ew,bh,11);x.fill();
          // avatar circle
          const r=bh/2-4, ac=ex+ew-r-8;
          x.fillStyle='rgba(255,255,255,.28)';x.beginPath();x.arc(ac,ey+bh/2,r,0,Math.PI*2);x.fill();
          x.fillStyle='#fff';x.font='800 '+Math.round(bh*0.42)+'px "Heebo",sans-serif';x.textAlign='center';
          x.fillText(e.name[0],ac,ey+bh/2+Math.round(bh*0.15));
          // name (full)
          x.fillStyle='#fff';x.font='800 '+Math.min(24,Math.round(bh*0.42))+'px "Heebo",sans-serif';x.textAlign='right';
          let nm=e.name; const maxw=ew-2*r-22;
          while(x.measureText(nm).width>maxw && nm.length>2){ nm=nm.slice(0,-1); }
          if(nm!==e.name) nm=nm.trim()+'…';
          x.fillText(nm, ex+ew-2*r-16, ey+bh/2+Math.round(bh*0.15));
        });
      }
    });
  });

  // ---- footer ----
  x.fillStyle='#1c0f0c';x.fillRect(0,H-54,W,54);
  x.fillStyle='#F2A71B';x.font='700 22px Anton,"Heebo",sans-serif';x.textAlign='center';
  x.fillText('La Pampa Shifts',W/2-95,H-20);
  x.fillStyle='#8C6E5A';x.font='600 18px "Heebo",sans-serif';
  x.fillText('· The Story of Meat 🍔',W/2+70,H-20);

  return c.toDataURL('image/png');
}
// rounded-rect helper (fallback safe)
function rr(x,a,b,w,h,r){ if(x.roundRect){x.beginPath();x.roundRect(a,b,w,h,r);} else {x.beginPath();x.rect(a,b,w,h);} }

/* ── RENDER ── */
function renderAll(){renderHeader();renderEmpManage();renderAssign();renderAvail();renderFinal();}

function renderHeader(){
  $('emp-count').textContent=`SHIFTS · ${employees.length} עובדים`;
  const wd=getWeekDates(weekOffset);
  $('week-label-main').textContent=weekLabel(weekOffset);
  $('week-label-sub').textContent=`${fmt(wd[0])} – ${fmt(wd[6])}`;
  const fb=$('finalize-btn'),bd=$('unpublish-btn');
  if(isFinalized()){fb.style.display='none';bd.style.display='flex';}else{fb.style.display='';bd.style.display='none';}
}

function renderEmpManage(){
  const el=$('emp-manage-list');
  if(!employees.length){el.innerHTML='<div class="empty-state" style="padding:24px"><div class="empty-sb">אין עובדים עדיין</div></div>';return;}
  el.innerHTML=employees.map(e=>`
    <div class="em-row" style="border-color:${e.color}40">
      <div class="em-left">
        <div class="em-av" style="background:${e.color}2e;border:2px solid ${e.color};color:${e.color}">${e.name[0]}</div>
        <div><div class="em-nm">${e.name}</div><div class="em-rl">${e.role} · ${totalAssigned(e.id)} משמרות השבוע</div></div>
      </div>
      <button class="btn-danger-sm em-del" data-id="${e.id}" data-name="${e.name}" data-color="${e.color}">מחק</button>
    </div>`).join('');
}

function renderAssign(){
  const wd=getWeekDates(weekOffset),tbl=$('assign-table');
  let h='<thead><tr><th class="shift-col"></th>';
  wd.forEach((d,i)=>{h+=`<th><span class="th-day-name ${isToday(d)?'today':''}">${DAYS_HE[i]}</span><span class="th-day-date">${fmt(d)}</span></th>`;});
  h+='</tr></thead><tbody>';
  SHIFTS.forEach(sh=>{
    h+=`<tr><td class="shift-rowhead"><div class="shift-chip"><div class="shift-bar" style="background:${sh.color}"></div><div><div class="shift-name">${sh.label}</div><div class="shift-time">${sh.time}</div></div></div></td>`;
    wd.forEach((_,di)=>{
      const av=employees.filter(e=>isAvailable(e.id,di,sh.id));
      h+=`<td style="padding:0"><div class="cell">`;
      if(!av.length)h+=`<div class="cell-empty">אין זמינים</div>`;
      av.forEach(e=>{const a=isAssigned(e.id,di,sh.id);
        h+=`<div class="pill ${a?'assigned':'available'}" style="${a?`background:${e.color};border-color:${e.color}`:''};${isFinalized()?'cursor:default':''}" data-emp="${e.id}" data-day="${di}" data-shift="${sh.id}"><span class="pill-ic">${a?'✓':'+'}</span><span class="pill-nm">${e.name.split(' ')[0]}</span></div>`;});
      h+=`</div></td>`;
    });
    h+='</tr>';
  });
  h+='</tbody>';tbl.innerHTML=h;
  $('summary-bar').innerHTML=employees.map(e=>{const ct=totalAssigned(e.id);
    return `<div class="summary-pill" style="background:${e.color}1c;border-color:${e.color}4d"><div class="summary-dot" style="background:${e.color}"></div><span class="summary-nm" style="color:${e.color}">${e.name}</span><span class="summary-ct">${ct} ${ct===1?'משמרת':'משמרות'}</span></div>`;}).join('');
}

function renderAvail(){
  const wd=getWeekDates(weekOffset);
  $('avail-chips').innerHTML=employees.map(e=>{const s=selectedAvailEmp===e.id;
    return `<div class="emp-chip" data-av-emp="${e.id}" style="${s?`background:${e.color}26;border-color:${e.color}`:''}"><div class="chip-av" style="background:${e.color}33;border:2px solid ${e.color};color:${e.color}">${e.name[0]}</div><span class="chip-nm" style="${s?`color:${e.color}`:''}">${e.name}</span></div>`;}).join('');
  const w=$('avail-grid-wrap');
  if(!selectedAvailEmp){w.innerHTML=`<div class="card empty-state"><div class="empty-ic">👆</div><div class="empty-tt">בחר עובד</div><div class="empty-sb">לחץ על עובד למעלה כדי לעדכן את הזמינות שלו לשבוע זה</div></div>`;return;}
  const e=getEmp(selectedAvailEmp);
  let h=`<div class="card"><div style="font-weight:800;color:${e.color};margin-bottom:14px;font-size:16px;display:flex;align-items:center;gap:9px"><div class="chip-av" style="background:${e.color}33;border:2px solid ${e.color};color:${e.color}">${e.name[0]}</div>${e.name} — מתי זמין?</div><div class="tbl-scroll"><table class="avail-table"><thead><tr><th class="shift-col"></th>`;
  wd.forEach((d,i)=>{h+=`<th><span class="th-day-name ${isToday(d)?'today':''}" style="font-size:12px">${DAYS_HE[i]}</span><span class="th-day-date">${fmt(d)}</span></th>`;});
  h+='</tr></thead><tbody>';
  SHIFTS.forEach(sh=>{h+=`<tr><td class="shift-rowhead"><div class="shift-chip"><div class="shift-bar" style="background:${sh.color};height:28px"></div><div><div class="shift-name" style="font-size:13px">${sh.label}</div><div class="shift-time">${sh.time}</div></div></div></td>`;
    wd.forEach((_,di)=>{const a=isAvailable(selectedAvailEmp,di,sh.id);
      h+=`<td style="text-align:center"><div class="avail-cell" style="${a?`background:${e.color}2e;border-color:${e.color};color:${e.color}`:''}" data-av-day="${di}" data-av-shift="${sh.id}">${a?'✓':''}</div></td>`;});
    h+='</tr>';});
  h+='</tbody></table></div><div class="avail-hint">לחץ על משבצת כדי לסמן שהעובד זמין. הסימונים מופיעים אוטומטית במסך השיבוץ.</div></div>';
  w.innerHTML=h;
}

function renderFinal(){
  const wd=getWeekDates(weekOffset);
  $('final-title').innerHTML=`📋 לוח <span class="accent">סופי</span> — ${weekLabel(weekOffset)}`;
  $('final-sub').textContent=`${fmt(wd[0])} – ${fmt(wd[6])}`;
  const dl=$('download-btn');
  if(!isFinalized()){dl.style.display='none';
    $('final-content').innerHTML=`<div class="card empty-state"><div class="empty-ic">📋</div><div class="empty-tt">הלוח עדיין לא פורסם</div><div class="empty-sb">סיים לשבץ את המשמרות, ואז לחץ "פרסם ✓" כדי ליצור לוח מעוצב לשיתוף</div></div>`;return;}
  dl.style.display='inline-flex';if(imgDataUrl){dl.href=imgDataUrl;dl.download=`לוח-משמרות-${weekLabel(weekOffset)}.png`;}
  let h='';
  if(imgDataUrl)h+=`<div class="card" id="img-wrap"><div id="img-head"><span>📸 תמונה לשיתוף בוואטסאפ</span><button id="regen-btn">רענן</button></div><img id="schedule-img" src="${imgDataUrl}" alt="לוח"/><div id="img-hint">לחץ "הורד תמונה" למעלה, ואז שלח לקבוצת העובדים</div></div>`;
  h+='<div class="day-cards">';
  wd.forEach((d,di)=>{const has=SHIFTS.some(s=>getAssigned(di,s.id).length>0);
    h+=`<div class="card fade-in" style="${has?'':'opacity:.45'}"><div class="day-head"><span class="day-label ${isToday(d)?'today':''}">${DAYS_HE[di]}</span><span class="day-date">${fmt(d)}</span>${!has?'<span class="day-noshift">· ללא משמרות</span>':''}</div><div class="shift-cards">`;
    SHIFTS.forEach(sh=>{const ids=getAssigned(di,sh.id);
      h+=`<div class="shift-card" style="border-color:${ids.length?sh.color+'55':''}"><div class="sc-head"><div class="sc-bar" style="background:${sh.color}"></div><span class="sc-name" style="color:${sh.color}">${sh.label}</span><span class="sc-time">${sh.time}</span></div>`;
      if(!ids.length)h+=`<div class="sc-empty">—</div>`;
      else{h+=`<div class="assigned-list">`;ids.forEach(id=>{const e=getEmp(id);if(!e)return;h+=`<div class="assigned-row"><div class="person-av" style="background:${e.color}2e;border:1.5px solid ${e.color};color:${e.color}">${e.name[0]}</div><div><div class="person-nm">${e.name}</div><div class="person-rl">${e.role}</div></div></div>`;});h+=`</div>`;}
      h+=`</div>`;});
    h+=`</div></div>`;});
  h+=`</div><div id="final-banner"><div class="fb-tt">✓ הלוח מוכן לשיתוף</div><div class="fb-sb">הורד את התמונה ושלח לעובדים</div></div>`;
  $('final-content').innerHTML=h;
  const rb=$('regen-btn');if(rb)rb.onclick=()=>{imgDataUrl=drawImage();renderFinal();toast('התמונה עודכנה');};
}

/* ── EVENTS ── */
document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.addEventListener('click',()=>{
  currentView=b.dataset.tab;
  document.querySelectorAll('.tab-btn[data-tab]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const v=$('view-'+currentView);v.classList.add('active');v.classList.remove('fade-in');void v.offsetWidth;v.classList.add('fade-in');
  renderAll();
}));
$('prev-week-btn').onclick=()=>{weekOffset--;renderAll();};
$('next-week-btn').onclick=()=>{weekOffset++;renderAll();};
$('finalize-btn').onclick=()=>{
  const any=SHIFTS.some(s=>getWeekDates(weekOffset).some((_,d)=>getAssigned(d,s.id).length>0));
  if(!any){toast('שבץ לפחות משמרת אחת לפני פרסום');return;}
  finalized[weekOffset]=true;imgDataUrl=drawImage();currentView='final';
  document.querySelectorAll('.tab-btn[data-tab]').forEach(x=>x.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="final"]').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('view-final').classList.add('active');
  renderAll();cloudSave();toast('הלוח פורסם! 🎉');
};
$('unpublish-btn').onclick=()=>{
  delete finalized[weekOffset];
  delete finalized[String(weekOffset)];
  currentView='assign';
  document.querySelectorAll('.tab-btn[data-tab]').forEach(x=>x.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="assign"]').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('view-assign').classList.add('active');
  renderAll();cloudSave();toast('הלוח פתוח לעריכה');
};
$('gear-btn').onclick=()=>{renderEmpManage();$('emp-manage-modal').classList.add('open');};
$('close-emp-manage').onclick=()=>$('emp-manage-modal').classList.remove('open');
$('emp-manage-modal').addEventListener('click',e=>{if(e.target===$('emp-manage-modal'))$('emp-manage-modal').classList.remove('open');});
$('emp-manage-list').addEventListener('click',e=>{const b=e.target.closest('.em-del');if(!b)return;
  pendingDeleteId=parseInt(b.dataset.id);const nm=b.dataset.name,co=b.dataset.color;
  const av=$('cd-av');av.style.cssText=`width:62px;height:62px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;background:${co}2e;border:2px solid ${co};color:${co}`;av.textContent=nm[0];
  $('cd-nm').textContent=nm;$('confirm-delete-modal').classList.add('open');});
$('cd-yes').onclick=()=>{if(!pendingDeleteId)return;const e=getEmp(pendingDeleteId);employees=employees.filter(x=>x.id!==pendingDeleteId);delete availability[pendingDeleteId];if(selectedAvailEmp===pendingDeleteId)selectedAvailEmp=null;pendingDeleteId=null;$('confirm-delete-modal').classList.remove('open');renderAll();cloudSave();toast('העובד נמחק');};
$('cd-no').onclick=()=>{pendingDeleteId=null;$('confirm-delete-modal').classList.remove('open');};
$('confirm-delete-modal').addEventListener('click',e=>{if(e.target===$('confirm-delete-modal')){pendingDeleteId=null;$('confirm-delete-modal').classList.remove('open');}});
$('open-add-emp-btn').onclick=()=>{$('emp-manage-modal').classList.remove('open');$('new-emp-name').value='';$('add-emp-modal').classList.add('open');setTimeout(()=>$('new-emp-name').focus(),100);};
$('cancel-add-emp').onclick=()=>$('add-emp-modal').classList.remove('open');
$('add-emp-modal').addEventListener('click',e=>{if(e.target===$('add-emp-modal'))$('add-emp-modal').classList.remove('open');});
$('confirm-add-emp').onclick=addEmp;
$('new-emp-name').addEventListener('keydown',e=>{if(e.key==='Enter')addEmp();});
function addEmp(){const nm=$('new-emp-name').value.trim();if(!nm){toast('הכנס שם עובד');return;}const role=$('new-emp-role').value;const color=EMP_COLORS[employees.length%EMP_COLORS.length];employees.push({id:Date.now(),name:nm,role,color});$('add-emp-modal').classList.remove('open');renderAll();cloudSave();toast(`${nm} נוסף/ה`);}
$('main').addEventListener('click',e=>{
  const p=e.target.closest('.pill');if(p&&!isFinalized()){toggleAssign(parseInt(p.dataset.emp),parseInt(p.dataset.day),p.dataset.shift);return;}
  const c=e.target.closest('[data-av-emp]');if(c){const id=parseInt(c.dataset.avEmp);selectedAvailEmp=selectedAvailEmp===id?null:id;renderAvail();return;}
  const cl=e.target.closest('.avail-cell');if(cl&&selectedAvailEmp!==null){toggleAvail(selectedAvailEmp,parseInt(cl.dataset.avDay),cl.dataset.avShift);return;}
});
const rs=$('new-emp-role');ROLES.forEach(r=>{const o=document.createElement('option');o.textContent=r;rs.appendChild(o);});
renderAll();   // render immediately with defaults
cloudLoad();   // then load saved data from cloud and re-render

</script>
</body>
</html>
